{% extends 'accounts/base.html' %}
{% block content %}
<div class="text-center mt-5">
    <h2>Complete your Profile</h2>
    <p>Please select your role to continue:</p>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" name="role" value="driver" class="btn btn-primary mr-3">I am a Driver</button>
        <button type="submit" name="role" value="passenger" class="btn btn-secondary">I am a Passenger</button>
    </form>
</div>
{% endblock %}
