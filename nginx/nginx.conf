upstream hello_django {
    # Ensure 'myapp' matches your Django service name in docker-compose.yml
    server web:8000;
}

server {
    listen 80;
    server_name dvmcarpool.duckdns.org www.dvmcarpool.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name dvmcarpool.duckdns.org www.dvmcarpool.duckdns.org;
    client_max_body_size 500M;

    ssl_certificate /etc/letsencrypt/live/dvmcarpool.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dvmcarpool.duckdns.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://hello_django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /home/app/web/staticfiles/;
    }
}