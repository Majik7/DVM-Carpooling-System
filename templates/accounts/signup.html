{% extends 'accounts/base.html' %}
{% block content %}
<h2>Sign Up</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary" type="submit">Sign Up</button>
</form>
<a href="{% url 'accounts:login' %}" class="btn btn-link">Already have an account? Login</a>
{% endblock %}
